<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Welcome to Factory Coffee</title>
    <link rel="stylesheet" type="text/css" href="styles/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="fonts/css/fontawesome-all.min.css">
  <style>
  /* Wrapper handles the zoom clipping */
  .landing-wrapper {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  }
  
  /* Image zoom container */
  .landing-bg {
  width: 100%; height: 100%;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/food/coffee/milk-mixed.jpg');
  background-size: cover;
  background-position: center;
  animation: zoomEffect 15s ease-in-out infinite;
  }
  
  @keyframes zoomEffect {
  0%, 100% { transform: scale(1.0); }    /* Full scale */
  50% { transform: scale(1.2); }         /* Zoom in */
  }
  </style>
  
  <div id="page">
  <div class="landing-wrapper">
  <div class="landing-bg"></div>
  </div>
  
  <div class="page-content min-vh-100 d-flex flex-column justify-content-end p-4" style="position: relative; z-index: 1;">
  <h1 class="color-white font-30 mb-2">Find Your<br>Perfect Brew</h1>
  <p class="color-white opacity-70 mb-5">Crafted coffee, rich aroma, and smooth taste—made for your daily pause.</p>
  
  <a href="index.html" class="btn btn-m bg-white color-black rounded-sm font-700 text-uppercase mb-5">
  Get Started <i class="fa fa-arrow-right ml-2"></i>
  </a>
  </div>
  </div>
  
</head>
